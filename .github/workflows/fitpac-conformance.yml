name: FITPAC conformance

on:
  push:
    paths:
      - "FITPAC/**"
      - "rfcs/**"
      - ".github/workflows/fitpac-conformance.yml"
  pull_request:
    paths:
      - "FITPAC/**"
      - "rfcs/**"
      - ".github/workflows/fitpac-conformance.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml jsonschema pytest
      - name: Verify manifest hashes
        run: python3 FITPAC/tools/verify_manifest_hashes.py
      - name: fitpac.prose_compiler validators
        run: |
          PYTHONPATH=FITPAC/extensions/fitpac_prose_compiler/tools pytest FITPAC/extensions/fitpac_prose_compiler/tools/tests -q
          python3 FITPAC/extensions/fitpac_prose_compiler/tools/validate_artifact.py graph \
            --pack FITPAC/extensions/fitpac_prose_compiler \
            --document FITPAC/extensions/fitpac_prose_compiler/tools/tests/fixtures/valid_minimal_graph.json
      - name: fitpac.prose_compiler context resolver
        run: python3 FITPAC/tools/fitpac_prose_compiler_context.py --json
